name: Build Desktop App
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
      - name: Install Electron dependencies
        run: npm install
      - name: Build frontend
        run: |
          cd web
          pnpm install --no-frozen-lockfile
          pnpm build
      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes || true
          df -h
      - name: Build macOS DMG
        run: |
          for i in 1 2 3; do
            echo "Build attempt $i..."
            npx electron-builder --mac && break
            echo "Attempt $i failed, waiting 15s before retry..."
            sleep 15
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          if-no-files-found: error
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
      - name: Install Electron dependencies
        run: npm install
      - name: Build frontend
        run: |
          cd web
          pnpm install --no-frozen-lockfile
          pnpm build
      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg
      - name: Install Electron dependencies
        run: npm install
      - name: Build frontend
        run: |
          cd web
          pnpm install --no-frozen-lockfile
          pnpm build
      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          if-no-files-found: error
